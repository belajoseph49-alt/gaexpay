<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 40 40" fill="none" role="img" aria-label="GaexPay">
  <defs>
    <!-- Brand gradient: emerald → teal → cyan -->
    <linearGradient id="gxp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="70%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <!-- White sheen on the mark stroke for a glassy premium feel -->
    <linearGradient id="gxp-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <!-- Top half soft highlight for depth -->
    <linearGradient id="gxp-sheen" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft drop shadow for the mark itself -->
    <filter id="gxp-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0" dy="0.6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="40" height="40" rx="11" fill="url(#gxp-bg)"/>
  <!-- Top-half glassy highlight -->
  <rect width="40" height="20" rx="11" fill="url(#gxp-sheen)"/>

  <!-- The G + arrow mark -->
  <g filter="url(#gxp-shadow)" stroke="url(#gxp-stroke)" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- G arc — 270° sweeping CCW from top to right edge -->
    <path d="M 21 11 A 10 10 0 1 0 29 20"/>
    <!-- G horizontal bar (the spine of the G) -->
    <path d="M 29 20 L 21 20"/>
    <!-- Arrow chevron at the right edge — payment / transfer direction -->
    <path d="M 26.5 16.5 L 30 20 L 26.5 23.5"/>
  </g>

  <!-- Center dot — closure / settled balance -->
  <circle cx="20" cy="20" r="1.35" fill="#ffffff"/>
</svg>
