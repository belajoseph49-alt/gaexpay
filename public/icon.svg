<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="55%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6.144"/>
      <feOffset dx="0" dy="6.144" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#sheen)"/>

  <!-- Subtle dark base ring for depth -->
  <rect x="256" y="256" width="511" height="511" fill="none" stroke="#022c22" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Logo group, scaled into a centered safe zone (~70% of canvas) -->
  <g transform="translate(76.8, 76.8) scale(14.933333333333332)" filter="url(#softShadow)">
    <path d="M4 7.5C4 6.12 5.12 5 6.5 5h8.8c1.1 0 2 .9 2 2v.5c0 1.1-.9 2-2 2H8.5C7.12 9.5 6 10.62 6 12s1.12 2.5 2.5 2.5h6.8c1.1 0 2 .9 2 2v.5c0 1.1-.9 2-2 2H6.5"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
    <circle cx="18.5" cy="12" r="1.4" fill="white"/>
  </g>
</svg>