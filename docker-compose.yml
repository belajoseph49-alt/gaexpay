version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/gaexpay?schema=public
      - DIRECT_URL=postgresql://postgres:password@db:5432/gaexpay?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - GAEXPAY_JWT_SECRET=super_secret_jwt_key_that_is_32_characters_long_min
      - GAEXPAY_ENC_KEY=super_secret_enc_key_that_is_32_characters_long_min
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gaexpay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
